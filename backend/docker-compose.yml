version: '3.8'

services:
  db:
    image: mysql:8
    container_name: floresta-sazonal-temperada
    ports:
      - "3311:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=floresta_sazonal_temperada
    volumes:
      - data_mysql:/var/lib/mysql

volumes:
  data_mysql:
